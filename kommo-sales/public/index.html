<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vendas Ganhas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #00e676;
    --accent-dim: #00e67622;
    --accent-glow: #00e67640;
    --text: #f5f5f5;
    --muted: #555;
    --danger: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid de fundo sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
    padding: 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.offline {
    background: var(--danger);
    box-shadow: 0 0 8px var(--danger);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Card principal */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.6s;
  }

  .card.flash::before { opacity: 1; }

  .card-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .value-wrapper {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }

  .currency {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 6px;
  }

  .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 14vw, 96px);
    line-height: 1;
    color: var(--text);
    letter-spacing: 0.02em;
    transition: color 0.3s;
  }

  .value.updated {
    color: var(--accent);
  }

  /* Separador */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* Último negócio */
  .last-deal {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .last-deal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .last-deal-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .last-deal-text {
    font-size: 13px;
    color: var(--muted);
  }

  .last-deal-name {
    color: var(--text);
    font-weight: 500;
  }

  /* Timestamp */
  .timestamp {
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    letter-spacing: 0.05em;
  }

  /* Partículas de celebração */
  .particle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 1px;
    pointer-events: none;
    animation: fall 1.2s ease-in forwards;
    z-index: 10;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120px) rotate(360deg); opacity: 0; }
  }

  /* Modo widget (sem body padding, fundo transparente) */
  @media (max-width: 400px) {
    body { background: transparent; }
    body::before { display: none; }
    .container { padding: 0; }
    .card { border-radius: 0; border: none; background: #111; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="label">Kommo · Vendas Ganhas</span>
    <div class="status-dot" id="dot"></div>
  </div>

  <div class="card" id="card">
    <div class="card-label">Total acumulado</div>

    <div class="value-wrapper">
      <span class="currency" id="currency">R$</span>
      <span class="value" id="value">—</span>
    </div>

    <div class="divider"></div>

    <div class="last-deal" id="lastDeal">
      <div class="last-deal-icon">🏆</div>
      <div>
        <div class="last-deal-text">Último negócio fechado</div>
        <div class="last-deal-name" id="dealName">—</div>
      </div>
    </div>

    <div class="timestamp" id="timestamp"></div>
  </div>
</div>

<script>
  const valueEl   = document.getElementById('value');
  const currEl    = document.getElementById('currency');
  const dotEl     = document.getElementById('dot');
  const cardEl    = document.getElementById('card');
  const lastDeal  = document.getElementById('lastDeal');
  const dealName  = document.getElementById('dealName');
  const tsEl      = document.getElementById('timestamp');

  let currentTotal = 0;

  function formatCurrency(val, curr) {
    return new Intl.NumberFormat('pt-BR', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    }).format(val);
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `Atualizado em ${d.toLocaleDateString('pt-BR')} às ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  }

  function animateValue(from, to, duration = 800) {
    const start = performance.now();
    function tick(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      // ease out cubic
      const ease = 1 - Math.pow(1 - progress, 3);
      const current = from + (to - from) * ease;
      valueEl.textContent = formatCurrency(current);
      if (progress < 1) requestAnimationFrame(tick);
      else valueEl.textContent = formatCurrency(to);
    }
    requestAnimationFrame(tick);
  }

  function celebrate() {
    const colors = ['#00e676', '#69f0ae', '#b9f6ca', '#ffffff', '#ffeb3b'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (20 + Math.random() * 60) + 'vw';
      p.style.top  = (10 + Math.random() * 40) + 'vh';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1600);
    }
  }

  function applyState(state) {
    const prev = currentTotal;
    currentTotal = state.total;

    // Símbolo da moeda
    currEl.textContent = state.currency === 'BRL' ? 'R$' : state.currency;

    // Animação do número
    animateValue(prev, state.total);

    // Flash no card
    if (prev !== state.total && prev !== 0) {
      celebrate();
      cardEl.classList.add('flash');
      valueEl.classList.add('updated');
      setTimeout(() => {
        cardEl.classList.remove('flash');
        valueEl.classList.remove('updated');
      }, 1000);
    }

    // Último negócio
    if (state.lastDeal) {
      dealName.textContent = state.lastDeal;
      lastDeal.classList.add('visible');
    }

    // Timestamp
    if (state.updatedAt) tsEl.textContent = formatTime(state.updatedAt);
  }

  // Conecta SSE
  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      dotEl.classList.remove('offline');
    };

    es.onmessage = (e) => {
      try {
        const state = JSON.parse(e.data);
        applyState(state);
      } catch (err) {
        console.error('Erro ao parsear SSE:', err);
      }
    };

    es.onerror = () => {
      dotEl.classList.add('offline');
      es.close();
      // Reconecta em 5s
      setTimeout(connect, 5000);
    };
  }

  connect();
</script>
</body>
</html>
